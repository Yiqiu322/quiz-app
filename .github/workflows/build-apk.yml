name: Build Android APK

on:
  push:
    branches: [ main, master, build ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04   # Buildozer 对 22.04 最稳定

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y -qq \
            git zip unzip wget curl \
            python3-pip python3-venv python3-dev \
            build-essential ccache pkg-config \
            libssl-dev libffi-dev \
            libncurses5-dev libncursesw5-dev \
            libjpeg-dev zlib1g-dev \
            liblzma-dev libbz2-dev libsqlite3-dev \
            libtool autoconf automake \
            openjdk-17-jdk-headless \
            gettext autopoint \
            python-is-python3

      - name: Install Buildozer
        run: |
          pip install --user cython==0.29.37 buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          echo 24333f8a63b6825ea9c5514f83c2829b0046791 >> ~/.android/repositories.cfg
          yes | $HOME/.local/bin/buildozer android accept_sdk_license 2>/dev/null || true

      - name: Build APK with Buildozer
        run: |
          cd ${{ github.workspace }}
          rm -rf ~/.buildozer/android/platform
          buildozer android debug 2>&1 | tee buildozer_output.log

      - name: Upload Buildozer log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: |
            ${{ github.workspace }}/buildozer_output.log
            ~/.buildozer/android/platform/build*/buildozer*.log
          if-no-files-found: continue

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: quiz-app-apk
          path: ${{ github.workspace }}/bin/*.apk
          if-no-files-found: warn
