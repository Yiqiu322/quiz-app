name: Build Android APK

on:
  push:
    branches: [ main, master, build ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip python3-venv \
            python3-dev build-essential libssl-dev libffi-dev \
            libncurses5-dev libncursesw5-dev libjpeg-dev zlib1g-dev \
            liblzma-dev libbz2-dev libsqlite3-dev \
            autoconf automake libtool pkg-config ccache \
            openjdk-17-jdk

      - name: Install Buildozer
        run: |
          pip install --user cython buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK with Buildozer
        run: |
          cd ${{ github.workspace }}
          # 删除可能存在的旧 Android SDK 缓存，确保干净构建
          rm -rf ~/.buildozer
          buildozer android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: quiz-app-apk
          path: ${{ github.workspace }}/bin/*.apk
          if-no-files-found: error
