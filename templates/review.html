<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ subject_name }}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif;
    background:#f4f1ec;color:#2c3e50;min-height:100vh
}
@media(min-width:768px){body{max-width:580px;margin:0 auto}}

/* Top bar */
.top{
    background:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;
    position:sticky;top:0;z-index:10;border-bottom:1px solid #e8e2da
}
.top a{color:#3a7d5c;text-decoration:none;font-size:26px;line-height:1}
.top .t{flex:1;font-size:15px;font-weight:600;color:#2c3e50}
.top .p{font-size:13px;color:#8a9ba8}

/* Progress */
.pbar{height:3px;background:#e8e2da}
.pbar div{height:100%;background:#3a7d5c;transition:width .35s ease;border-radius:0 2px 2px 0}

/* Meta */
.meta{display:flex;gap:6px;padding:10px 16px 6px;flex-wrap:wrap;align-items:center}
.meta .b{font-size:12px;padding:3px 10px;border-radius:20px;background:#e8e2da;color:#8a9ba8}
.meta .bw{background:#fdf0ee;color:#d4786a}
.meta button{
    font-size:12px;padding:3px 10px;border-radius:20px;border:none;cursor:pointer;
    font-family:inherit;background:#e8e2da;color:#8a9ba8;transition:all .12s
}
.meta button:active{transform:scale(.94)}
.meta .on{background:#eaf5ee;color:#3a7d5c;font-weight:600}

/* Card */
.card{
    background:#fff;border-radius:16px;margin:10px 12px 0;padding:20px 18px;
    box-shadow:0 1px 4px rgba(0,0,0,.04)
}
.stem{font-size:17px;font-weight:600;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.stem-img{max-width:100%;height:auto;border-radius:10px;margin-top:10px;display:block}

/* Options */
.opts{margin:8px 12px 0;display:flex;flex-direction:column;gap:8px}
.opt{
    display:flex;align-items:center;gap:12px;width:100%;
    background:#fff;border:1.5px solid #e8e2da;border-radius:14px;
    padding:14px 16px;font-size:15px;text-align:left;color:#2c3e50;
    cursor:pointer;transition:all .12s;font-family:inherit;line-height:1.4;
    box-shadow:0 1px 3px rgba(0,0,0,.02)
}
.opt:active{transform:scale(.97)}
.opt .l{
    width:30px;height:30px;line-height:30px;text-align:center;
    border-radius:50%;background:#f4f1ec;color:#5b7b7a;
    font-weight:700;font-size:14px;flex-shrink:0;transition:all .12s
}
.opt.sel{border-color:#3a7d5c;background:#f6fbf8}
.opt.sel .l{background:#3a7d5c;color:#fff}
.opt.c{border-color:#6dbf8a;background:#f2faf5}
.opt.c .l{background:#6dbf8a;color:#fff}
.opt.e{border-color:#d99587;background:#fcf4f2}
.opt.e .l{background:#d99587;color:#fff}

/* Feedback */
.fb{
    margin:8px 12px 0;padding:14px 16px;border-radius:14px;
    font-size:15px;font-weight:700;text-align:center;display:none
}
.fb.s{display:block;animation:in .2s}
.fb.ok{background:#f2faf5;color:#3a7d5c}
.fb.no{background:#fcf4f2;color:#d4786a}
.fb .d{font-size:13px;font-weight:400;margin-top:4px;opacity:.75}

/* Next */
.nw{margin:10px 12px 24px}
.nx{
    width:100%;background:#3a7d5c;color:#fff;border:none;border-radius:14px;
    padding:16px;font-size:16px;font-weight:700;cursor:pointer;
    transition:all .12s;font-family:inherit;display:none;
    box-shadow:0 2px 8px rgba(58,125,92,.25)
}
.nx.s{display:block;animation:in .2s}
.nx:active{transform:scale(.96)}

/* Completion */
.done{text-align:center;padding:24px 12px}
.done .e{font-size:56px;margin-bottom:6px}
.done h2{font-size:24px;color:#3a7d5c;margin-bottom:18px}
.done .g{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.done .g>div{
    background:#fff;border-radius:14px;padding:14px 20px;min-width:76px;
    box-shadow:0 1px 4px rgba(0,0,0,.04)
}
.done .g .n{font-size:28px;font-weight:800}
.done .g .l{font-size:11px;color:#8a9ba8;margin-top:2px}
.done .g .g2{color:#6dbf8a}.done .g .r{color:#d99587}.done .g .o{color:#c8904a}
.done .bk{
    display:inline-block;background:#3a7d5c;color:#fff;padding:14px 44px;
    border-radius:14px;text-decoration:none;font-size:15px;font-weight:600;
    box-shadow:0 2px 8px rgba(58,125,92,.25)
}

.empty{text-align:center;padding:60px 20px;color:#8a9ba8}
.empty .e{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;margin-bottom:20px}
.bk{display:inline-block;background:#3a7d5c;color:#fff;padding:12px 32px;border-radius:12px;text-decoration:none;font-size:14px}

@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="top">
    <a href="/" id="bl">‹</a>
    <span class="t">{{ subject_name }}</span>
    <span class="p" id="pt">0/0</span>
</div>
<div class="pbar"><div id="pb" style="width:0%"></div></div>

{% if msg %}
<div class="empty"><div class="e">📭</div><p>{{ msg }}</p><a href="/" class="bk">← 返回</a></div>
{% else %}

<div class="meta" id="meta">
    <span class="b" id="wb"></span>
    <button id="sb" onclick="ts()">☆ 星标</button>
    <button id="sfb" onclick="tsf()" style="margin-left:auto;">🔀 开</button>
</div>

<div class="card" id="qc">
    <div class="stem" id="st"></div>
    <div id="si"></div>
</div>

<div class="opts" id="oc"></div>
<div class="fb" id="fb"></div>
<div class="nw"><button class="nx" id="nb" onclick="nq()">⏭ 下一题</button></div>

<script>
const qs = {{ questions_json | tojson | safe }};
let idx=0, ans=false, ok=0, tot=0, map=[], shf=true;

function tsf(){shf=!shf;document.getElementById('sfb').textContent='🔀 '+(shf?'开':'关')}
function ts(){
    const q=qs[idx];if(!q)return
    fetch('/api/toggle_star',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question_id:q.id})})
    .then(r=>r.json()).then(d=>{q.starred=d.starred
        const b=document.getElementById('sb')
        b.textContent=d.starred?'⭐ 星标':'☆ 星标'
        b.className=d.starred?'on':''
    }).catch(()=>{})
}

function sq(i){
    if(i>=qs.length){done();return}
    idx=i;ans=false;const q=qs[i]
    document.getElementById('pt').textContent=(i+1)+'/'+qs.length
    document.getElementById('pb').style.width=((i/qs.length)*100)+'%'
    document.getElementById('st').textContent=q.stem
    document.getElementById('si').innerHTML=''

    const wb=document.getElementById('wb')
    wb.textContent=q.wrong_count>0?'❌ 已错 '+q.wrong_count+' 次':''
    wb.className=q.wrong_count>0?'b bw':'b'

    const sb=document.getElementById('sb')
    sb.textContent=q.starred?'⭐ 星标':'☆ 星标'
    sb.className=q.starred?'on':''

    let opts=Object.entries(q.options)
    if(shf){for(let i=opts.length-1;i>0;i--){let j=Math.random()*(i+1)|0;[opts[i],opts[j]]=[opts[j],opts[i]]}}
    map=[]
    const oc=document.getElementById('oc');oc.innerHTML=''
    const ls='ABCD'
    opts.forEach(([orig,text],i)=>{
        const dl=ls[i];map.push([dl,orig])
        const b=document.createElement('button')
        b.className='opt';b.innerHTML='<span class="l">'+dl+'</span><span>'+text+'</span>'
        b.dataset.d=dl;b.onclick=()=>so(dl);oc.appendChild(b)
    })
    document.getElementById('fb').className='fb';document.getElementById('fb').style.display='none'
    document.getElementById('nb').className='nx'
}

function so(dl){
    if(ans)return;ans=true;const q=qs[idx]
    let orig=dl;for(const[d,o]of map){if(d===dl){orig=o;break}}
    document.querySelectorAll('.opt').forEach(b=>b.disabled=true)
    fetch('/api/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question_id:q.id,answer:orig})})
    .then(r=>r.json()).then(res=>{
        tot++;if(res.correct)ok++
        document.querySelectorAll('.opt').forEach(b=>{
            let o=b.dataset.d;for(const[d,k]of map){if(d===o){o=k;break}}
            if(o===res.correct_answer)b.classList.add('c')
            if(b.dataset.d===dl&&!res.correct)b.classList.add('e')
        })
        const fb=document.getElementById('fb')
        if(res.correct){fb.className='fb s ok';fb.innerHTML='✅ 正确'}
        else{fb.className='fb s no';fb.innerHTML='❌ 错误<br><span class="d">正确答案：'+res.correct_answer+'. '+res.correct_text+'</span>'}
        if(res.wrong_count>0)fb.innerHTML+='<span class="d">（已错 '+res.wrong_count+' 次）</span>'
        const nb=document.getElementById('nb')
        nb.className='nx s';nb.textContent=idx>=qs.length-1?'📊 看成绩':'⏭ 下一题'
    }).catch(()=>{ans=false;alert('提交失败，请重试')})
}

function nq(){if(idx+1>=qs.length)done();else sq(idx+1)}

function done(){
    const p=tot>0?Math.round(ok/tot*100):0,w=tot-ok
    document.getElementById('pb').style.width='100%'
    document.getElementById('qc').innerHTML='<div class="done"><div class="e">🎉</div><h2>完成！</h2><div class="g"><div><div class="n g2">'+ok+'</div><div class="l">✅ 正确</div></div><div><div class="n r">'+w+'</div><div class="l">❌ 错误</div></div><div><div class="n o">'+p+'%</div><div class="l">🎯 正确率</div></div></div><a href="/" class="bk">← 返回首页</a></div>'
    document.getElementById('oc').innerHTML='';document.getElementById('fb').style.display='none'
    document.getElementById('nb').className='nx';document.getElementById('meta').innerHTML=''
    document.getElementById('pt').textContent='已完成';document.getElementById('bl').innerHTML='‹ 返回'
}

document.addEventListener('keydown',e=>{
    const k=e.key.toUpperCase(),btns=document.querySelectorAll('.opt'),m={A:0,B:1,C:2,D:3}
    if(k in m&&btns[m[k]]&&!btns[m[k]].disabled)btns[m[k]].click()
    if(['ENTER','ARROWRIGHT',' '].includes(k)){const nb=document.getElementById('nb');if(nb.className.includes('s'))nb.click()}
})

sq(0)
</script>
{% endif %}
</body>
</html>
